name = "voelpping"
main = "src/index.ts"
compatibility_date = "2026-04-01"

routes = [
  { pattern = "voelp.jonas-strassel.de", custom_domain = true }
]

[observability]
enabled = true

[triggers]
crons = ["0 7 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "voelpping"
database_id = "8fe5442d-94a7-4652-8001-bb2139ba96e7"
migrations_dir = "migrations"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "voelpping-notifications"

[[queues.consumers]]
queue = "voelpping-notifications"
max_batch_size = 10
max_retries = 3

[[r2_buckets]]
binding = "MENU_IMAGES"
bucket_name = "voelpping-menu-images"

[vars]
BOT_USERNAME = "voelp_bot"
R2_PUBLIC_BASE_URL = "https://pub-0a67ad8e5d5946bc94e2075980b25a29.r2.dev"

[ai]
binding = "AI"
